<html>
<head>
  <title>Greeting Widget</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pirata+One">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amarante">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    #container {
      background: linear-gradient(to bottom, rgba(102, 102, 153, 0.7) 13%, rgba(102, 0, 51, 0.7) 100%);
      border: 4px double black;
      padding: 5px;
      text-align: center;
      width: 100%;
    }

    #greeting {
      font-family: "Pirata One", serif;
      font-size: 2.4em;
      color: black;
      letter-spacing: 0.03em;
      line-height: 1.3;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.5);
    }

    #date {
      font-family: "Amarante", serif;
      font-size: 1em;
      color: black;
      letter-spacing: 0.08em;
      margin-top: 4px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="greeting"></div>
    <div id="date"></div>
  </div>

  <script>
    const months = [
      "January","February","March","April","May","June",
      "July","August","September","October","November","December"
    ];
    const weekdays = [
      "Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"
    ];

    const today = new Date();
    const hrs = today.getHours();
    const dayName = weekdays[today.getDay()];
    const monthName = months[today.getMonth()];
    const dayNum = today.getDate();

    let greet;
    if (hrs < 12)
      greet = "Good morning, Lacey";
    else if (hrs >= 12 && hrs <= 17)
      greet = "Good afternoon, Lacey";
    else if (hrs >= 17 && hrs <= 24)
      greet = "Good evening, Lacey";

    const dateStr = `Today is ${dayName}, ${monthName} ${dayNum}`;

    document.getElementById("greeting").textContent = greet;
    document.getElementById("date").textContent = dateStr;
  </script>
</body>
</html>
</body>
</html>
